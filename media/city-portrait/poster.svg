<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="City Portrait title card">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111"/>
      <stop offset="0.48" stop-color="#050505"/>
      <stop offset="1" stop-color="#1a1a1a"/>
    </linearGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.16"/>
      </feComponentTransfer>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#g)"/>
  <rect width="1600" height="900" filter="url(#grain)" opacity="0.3"/>
  <path d="M170 645h1260" stroke="#f1eee7" stroke-opacity="0.26" stroke-width="2"/>
  <text x="170" y="370" fill="#f1eee7" font-family="Poppins, Arial, sans-serif" font-size="42" font-weight="500" letter-spacing="9">TAY STUDIO ORIGINALS</text>
  <text x="170" y="500" fill="#f1eee7" font-family="'PingFang SC', 'Microsoft YaHei', Arial, sans-serif" font-size="104" font-weight="700">城市肖像</text>
  <text x="172" y="590" fill="#f1eee7" fill-opacity="0.68" font-family="Poppins, Arial, sans-serif" font-size="34" font-weight="400" letter-spacing="5">CITY PORTRAIT</text>
</svg>
